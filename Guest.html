<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wedding Guests</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;1,500;1,600&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bark:    #6b4c35;
      --bark-lt: #8c6348;
      --soil:    #4a3323;
      --tan:     #c4a882;
      --cream:   #f5efe6;
      --warm-bg: #f7f0e8;
      --stone:   #a09080;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { height:100%; height:-webkit-fill-available; }

    body {
      background: #cfc0ae;
      font-family: 'Noto Sans TC','Helvetica Neue',sans-serif;
      color: var(--soil);
      display: flex; justify-content: center;
      height: 100%; height: -webkit-fill-available;
      overflow: hidden;
    }

    .phone-wrap {
      width: 100%; max-width: 430px;
      background: var(--warm-bg);
      height: 100%; height: -webkit-fill-available;
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }

    /* ══════════════════════════════════════
       LOCK SCREEN
    ══════════════════════════════════════ */
    #lockScreen {
      position: absolute; inset: 0; z-index: 100;
      background: #2c2318;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 36px calc(40px + env(safe-area-inset-bottom, 0px));
    }

    .lock-deco {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1.5px solid rgba(196,168,130,0.4);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      position: relative;
    }
    .lock-deco::before {
      content: '';
      position: absolute; inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(196,168,130,0.2);
    }
    .lock-deco svg { width: 28px; height: 28px; }

    .lock-title {
      font-family: 'Lora', serif;
      font-size: 25px; font-weight: 600;
      color: var(--cream); letter-spacing: 0.03em;
      margin-bottom: 6px; text-align: center;
    }
    .lock-sub {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 15px; color: rgba(196,168,130,0.6);
      letter-spacing: 0.14em; text-align: center;
      margin-bottom: 40px;
    }

    .lock-input-wrap {
      width: 100%; position: relative; margin-bottom: 14px;
    }
    .lock-input {
      width: 100%; height: 52px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(196,168,130,0.22);
      border-radius: 14px;
      color: var(--cream);
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 600;
      letter-spacing: 0.18em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--tan);
    }
    .lock-input::placeholder {
      color: rgba(196,168,130,0.3);
      letter-spacing: 0.1em; font-size: 15px; font-weight: 400;
    }
    .lock-input:focus { border-color: rgba(196,168,130,0.55); }
    .lock-input.shake {
      animation: shake 0.38s ease;
      border-color: rgba(176,103,58,0.7);
    }

    .lock-btn {
      width: 100%; height: 52px;
      background: var(--bark);
      border: none; border-radius: 14px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .lock-btn:active { background: var(--soil); transform: scale(0.98); }

    .lock-error {
      margin-top: 12px;
      font-size: 15px; color: rgba(176,103,58,0.85);
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.06em; text-align: center;
      height: 16px;
    }

    #lockScreen.unlocking {
      animation: lockFadeOut 0.55s ease forwards;
    }
    @keyframes lockFadeOut {
      0%   { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(1.04); pointer-events:none; }
    }
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      20%     { transform:translateX(-8px); }
      40%     { transform:translateX(8px); }
      60%     { transform:translateX(-5px); }
      80%     { transform:translateX(5px); }
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .header {
      flex-shrink: 0;
      height: calc(50px + env(safe-area-inset-top, 50px));
      padding-top: env(safe-area-inset-top, 44px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--warm-bg); z-index: 10;
    }
    .header-label {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 12px; letter-spacing: 0.22em;
      color: var(--stone); text-transform: uppercase; margin-bottom: 2px;
    }
    .header-title {
      font-family: 'Lora', serif;
      font-size: 18px; font-weight: 600;
      color: var(--bark); letter-spacing: 0.04em;
    }

    /* ══════════════════════════════════════
       STACK AREA
    ══════════════════════════════════════ */
    .stack-area {
      flex: 1; position: relative; overflow: hidden;
      padding: 10px 42px 72px;
    }

    /* ══════════════════════════════════════
       CARD
    ══════════════════════════════════════ */
    .card {
      position: absolute;
      top: 10px; left: 42px; right: 42px; bottom: 72px;
      border-radius: 22px; overflow: hidden;
      background: #2a1f16;
      box-shadow: 0 12px 40px rgba(20,10,4,0.38);
      transform-origin: center bottom;
      transition: transform 0.38s cubic-bezier(0.34,1.4,0.64,1), opacity 0.3s ease;
      will-change: transform, opacity;
      user-select: none; touch-action: pan-y;
      pointer-events: none;
    }
    .card[data-depth="0"] { pointer-events: auto; }
    .card[data-depth="0"] { transform: translate(  0px,  0px) rotate( 0.0deg) scale(1.00); opacity:1;    z-index:5; }
    .card[data-depth="1"] { transform: translate( 10px, 14px) rotate( 2.6deg) scale(0.95); opacity:1;    z-index:4; }
    .card[data-depth="2"] { transform: translate( -8px, 26px) rotate(-2.0deg) scale(0.90); opacity:0.65; z-index:3; }
    .card[data-depth="3"] { transform: translate(  5px, 36px) rotate( 1.6deg) scale(0.86); opacity:0;    z-index:2; }

    .card-photos { position:absolute; inset:0; }
    .card-photo {
      position:absolute; inset:0;
      opacity:0;
    }
    .card-photo.active { opacity:1; }

    .photo-dots {
      position:absolute; top:13px; left:50%;
      transform:translateX(-50%);
      display:flex; gap:5px; z-index:4;
      pointer-events:none;
    }
    .photo-dot {
      width:22px; height:3px; border-radius:2px;
      background:rgba(255,255,255,0.35);
    }
    .photo-dot.active { background:rgba(255,255,255,0.95); }

    .hit-prev, .hit-next {
      position:absolute; top:0; bottom:0; width:30%;
      z-index:15; cursor:pointer;
    }
    .hit-prev { left:0; } .hit-next { right:0; }

    .card-info {
      position:absolute; bottom:0; left:0; right:0;
      padding:18px 20px 24px; z-index:3;
      transition:opacity 0.22s ease;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }
    .card-name {
      font-family:'Lora',serif; font-size:30px; font-weight:600;
      color:var(--warm-bg); line-height:1.15; letter-spacing:0.01em;
    }
    .card-meta { display:flex; align-items:center; gap:7px; margin-top:4px; }
    .card-age  { font-family:'Nunito',sans-serif; font-size:15px; font-weight:500; color:var(--warm-bg); }
    .meta-dot  { width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,0.4); }
    .card-zodiac { font-size:15px; color:var(--warm-bg); letter-spacing:0.07em; }

    /* ══════════════════════════════════════
       LIKE BUTTON
    ══════════════════════════════════════ */
    .like-btn {
      position: absolute;
      bottom: 24px; right: 22px;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 20;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), background 0.18s;
    }
    .like-btn:active { transform: scale(0.88); }
    .like-btn svg { width: 25px; height: 25px; transition: fill 0.18s ease, stroke 0.18s ease; }
    .like-btn .heart-outline { fill: none; stroke: rgba(255,255,255,0.9); stroke-width: 1.8; }
    .like-btn.liked .heart-outline { fill: #e5353b; stroke: #e5353b; }
    @keyframes heartPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.32); }
      70%  { transform: scale(0.92); }
      100% { transform: scale(1); }
    }
    .like-btn.pop { animation: heartPop 0.38s cubic-bezier(0.34,1.56,0.64,1); }

    /* ══════════════════════════════════════
       IG SLIDE
    ══════════════════════════════════════ */
    .ig-slide {
      position:absolute; inset:0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index:1; opacity:0;
      transition:opacity 0.22s ease;
      pointer-events:none;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }
    .ig-slide.visible { opacity:1; z-index:10; pointer-events:auto; }

    .ig-deco-ring {
      width:96px; height:96px; border-radius:50%;
      border:1.5px solid var(--tan);
      display:flex; align-items:center; justify-content:center;
      position:relative; margin-bottom:16px; flex-shrink:0;
    }
    .ig-deco-ring::before {
      content:''; position:absolute; inset:7px;
      border-radius:50%; border:1px solid rgba(196,168,130,0.35);
    }
    .ig-deco-ring svg { width:38px; height:38px; }

    .ig-name {
      font-family:'Lora',serif; font-size:20px; font-weight:600;
      color:var(--cream); letter-spacing:0.02em; margin-bottom:3px;
    }
    .ig-handle-lbl {
      font-size:15px; color:var(--stone); letter-spacing:0.1em;
      margin-bottom:22px;
    }
    .ig-btn {
      display:inline-flex; align-items:center;
      padding:11px 26px;
      background:var(--bark); color:#fff;
      border-radius:50px; border:none;
      font-family:'Nunito',sans-serif;
      font-size:12px; font-weight:700; letter-spacing:0.05em;
      text-decoration:none; cursor:pointer;
      transition:background 0.15s, transform 0.1s;
    }
    .ig-btn:active { background:var(--soil); transform:scale(0.96); }

    .ig-foot {
      position:absolute; top:20px;
      font-family:'Lora',serif; font-style:italic;
      font-size:12px; color:var(--tan); letter-spacing:0.14em;
    }

    /* ══════════════════════════════════════
       FLOATING PILL NAV
    ══════════════════════════════════════ */
    .nav-float {
      position: absolute;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 20;
      background: rgba(44,35,24,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 50px;
      border: 1px solid rgba(196,168,130,0.18);
      padding: 5px 6px;
      display: flex; gap: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.32);
    }
    .nav-tab {
      height: 38px; padding: 0 20px;
      border-radius: 50px; border: none;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 600;
      letter-spacing: 0.06em;
      color: rgba(196,168,130,0.55);
      cursor: pointer;
      transition: background 0.22s, color 0.22s;
      white-space: nowrap;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    .nav-tab.active { background: var(--tan); color: var(--soil); }
    .nav-tab[data-filter="likes"] { padding: 0 16px; }
    .nav-tab[data-filter="likes"] svg { width: 22px; height: 22px; }
    .nav-tab[data-filter="likes"] .likes-heart { fill: #e5353b; }
    .nav-tab[data-filter="likes"].active { background: rgba(229,53,59,0.18); }
    .nav-tab[data-filter="likes"].active .likes-heart { fill: #e5353b; }
    .nav-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ══════════════════════════════════════
       LIKES EMPTY STATE
    ══════════════════════════════════════ */
    .likes-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; 
      /* justify-content: center; */
      gap: 14px; padding: 40px;
    }
    .likes-empty-box {
      width: calc(100% - 20px);
      height: 90%;
      border: 2px dashed var(--stone);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
    }
    .likes-empty svg { width: 56px; height: 56px; opacity: 0.25; }
    .likes-empty-title {
      font-family: 'Lora', serif; font-size: 18px; font-weight: 600;
      color: var(--bark); letter-spacing: 0.02em; text-align: center;
    }
    .likes-empty-sub {
      font-family: 'Nunito', sans-serif; font-size: 16px;
      color: var(--stone); letter-spacing: 0.04em;
      text-align: center; line-height: 1.6;
    }
    .likes-empty-title .en,
    .likes-empty-sub .en {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.85;
      letter-spacing: 0.02em;
    }
    /* ══════════════════════════════════════
       POST-LOGIN LOADING OVERLAY
    ══════════════════════════════════════ */
    #loginLoader {
      position: absolute;
      inset: 0;
      z-index: 90;
      background: var(--warm-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      transition: opacity 0.4s ease;
    }

    #loginLoader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .paw-label {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--stone);
      letter-spacing: 0.14em;
    }

    .paw-trail.walk {
      display: flex;
      align-items: flex-end;
      gap: 25px;
    }

    .paw-trail.walk .paw:nth-child(odd) {
      --step-offset: -15px;
    }

    .paw-trail.walk .paw:nth-child(even) {
      --step-offset: 15px;
    }

    .paw-trail.walk .paw {
      opacity: 0;
      transform: translateX(-40px) translateY(6px) scale(0.75) rotate(-10deg);
      animation: pawWalk 1.8s ease-in-out infinite;
    }

    .paw-trail.walk .paw:nth-child(1) { animation-delay: 0s; }
    .paw-trail.walk .paw:nth-child(2) { animation-delay: 0.45s; }
    .paw-trail.walk .paw:nth-child(3) { animation-delay: 0.9s; }
    .paw-trail.walk .paw:nth-child(4) { animation-delay: 1.35s; }

    @keyframes pawWalk {
      0% {
        opacity: 0;
        transform: translateX(-40px) translateY(calc(8px + var(--step-offset))) scale(0.7) rotate(-12deg);
      }
      15% {
        opacity: 1;
        transform: translateX(-10px) translateY(calc(0px + var(--step-offset))) scale(1) rotate(-8deg);
      }
      35% {
        opacity: 1;
        transform: translateX(10px) translateY(calc(2px + var(--step-offset))) scale(0.95) rotate(6deg);
      }
      55% {
        opacity: 0.9;
        transform: translateX(25px) translateY(calc(0px + var(--step-offset))) scale(1) rotate(-6deg);
      }
      75% {
        opacity: 0.6;
        transform: translateX(40px) translateY(calc(4px + var(--step-offset))) scale(0.9) rotate(8deg);
      }
      100% {
        opacity: 0;
        transform: translateX(60px) translateY(calc(8px + var(--step-offset))) scale(0.8) rotate(12deg);
      }
    }

    /* ══════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════ */
    .card.exit-left   { animation:exitLeft   0.34s cubic-bezier(0.4,0,0.6,1) forwards; }
    .card.exit-right  { animation:exitRight  0.34s cubic-bezier(0.4,0,0.6,1) forwards; }
    .card.enter-left  { animation:enterLeft  0.40s cubic-bezier(0.22,1,0.36,1) forwards; }
    .card.enter-right { animation:enterRight 0.40s cubic-bezier(0.22,1,0.36,1) forwards; }

    @keyframes exitLeft { to { transform:translateX(-140%) rotate(-18deg); opacity:0; } }
    @keyframes enterLeft {
      from { transform:translateX(-60%) rotate(-10deg) scale(0.9); opacity:0; }
      to   { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
    }
  </style>
</head>
<body>
<div class="phone-wrap">

  <div id="lockScreen">
    <div class="lock-deco">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(196,168,130,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="lock-title">Wedding Guests</div>
    <div class="lock-sub">— guests only —</div>
    <div class="lock-input-wrap">
      <input id="phoneInput" class="lock-input" type="tel"
        inputmode="numeric" maxlength="12"
        placeholder="輸入手機號碼" autocomplete="off">
    </div>
    <button class="lock-btn" id="lockBtn">進入</button>
    <div class="lock-error" id="lockError"></div>
  </div>

  <header class="header">
    <div class="header-label">Wedding Guests</div>
    <div class="header-title">認識今天的嘉賓</div>
  </header>

  <div class="stack-area" id="stackArea"></div>

  <div id="loginLoader">
    <div class="paw-trail walk">
      <svg class="paw" viewBox="0 0 64 64" width="36" height="36" fill="var(--bark)">
        <g transform="rotate(90 32 32)">
          <path d="M32 50 C20 50,16 40,20 36 C24 32,28 36,32 34 C36 36,40 32,44 36 C48 40,44 50,32 50Z"/>
          <circle cx="18" cy="28" r="6"/>
          <circle cx="46" cy="28" r="6"/>
          <circle cx="26" cy="18" r="5.5"/>
          <circle cx="38" cy="18" r="5.5"/>
        </g>
      </svg>

      <svg class="paw" viewBox="0 0 64 64" width="36" height="36" fill="var(--bark)">
        <g transform="rotate(90 32 32)">
          <path d="M32 50 C20 50,16 40,20 36 C24 32,28 36,32 34 C36 36,40 32,44 36 C48 40,44 50,32 50Z"/>
          <circle cx="18" cy="28" r="6"/>
          <circle cx="46" cy="28" r="6"/>
          <circle cx="26" cy="18" r="5.5"/>
          <circle cx="38" cy="18" r="5.5"/>
        </g>
      </svg>

      <svg class="paw" viewBox="0 0 64 64" width="36" height="36" fill="var(--bark)">
        <g transform="rotate(90 32 32)">
          <path d="M32 50 C20 50,16 40,20 36 C24 32,28 36,32 34 C36 36,40 32,44 36 C48 40,44 50,32 50Z"/>
          <circle cx="18" cy="28" r="6"/>
          <circle cx="46" cy="28" r="6"/>
          <circle cx="26" cy="18" r="5.5"/>
          <circle cx="38" cy="18" r="5.5"/>
        </g>
      </svg>

      <svg class="paw" viewBox="0 0 64 64" width="36" height="36" fill="var(--bark)">
        <g transform="rotate(90 32 32)">
          <path d="M32 50 C20 50,16 40,20 36 C24 32,28 36,32 34 C36 36,40 32,44 36 C48 40,44 50,32 50Z"/>
          <circle cx="18" cy="28" r="6"/>
          <circle cx="46" cy="28" r="6"/>
          <circle cx="26" cy="18" r="5.5"/>
          <circle cx="38" cy="18" r="5.5"/>
        </g>
      </svg>
    </div>
    <div class="paw-label">loading…</div>
  </div>
  
  <nav class="nav-float" id="nav">
    <button class="nav-tab" data-filter="male">
      <svg viewBox="0 0 24 24" class="nav-icon">
        <path d="M16 2h6v6h-2V5.41l-3.29 3.3a7 7 0 1 1-1.41-1.41L18.59 4H16V2z"/>
      </svg>
      男生
    </button>

    <button class="nav-tab active" data-filter="likes">
      <svg viewBox="0 0 24 24" class="nav-icon">
        <path class="likes-heart" d="M12 21C12 21 3 14.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.91 3.81 13 5.08C14.09 3.81 15.76 3 17.5 3C20.58 3 23 5.42 23 8.5C23 14.5 12 21 12 21Z"/>
      </svg>
    </button>

    <button class="nav-tab" data-filter="female">
      女生
      <svg viewBox="0 0 24 24" class="nav-icon">
        <path d="M12 2a6 6 0 1 1 0 12v3h3v2h-3v3h-2v-3H7v-2h3v-3a6 6 0 0 1 2-12z"/>
      </svg>
    </button>
  </nav>

</div>
<script>
/* ══════════════════════════════════════
   CONFIG & STATE
══════════════════════════════════════ */
const GAS_URL      = 'https://script.google.com/macros/s/AKfycbzlaYIu1kat5DdOW26GNWm3uUEVOpOTm1WOJESPu5JV5eqXbNV2UYCPQAod-MSfGOjw/exec';
const MASTER_PHONE = '0987654321';
const validNumbers = new Set([MASTER_PHONE]);
let defaultCard   = null;
let allGuestData  = [];
let myLikes       = new Set();
let currentUserId = null;
let likesReady    = false;

const guestDataReady = fetchGuestData();
async function initial() {
  initLockScreen();
  await guestDataReady;
  initMainApp();
}
initial();

/* ══════════════════════════════════════
   DATA FETCH
══════════════════════════════════════ */
async function fetchGuestData() {
  try {
    const res = await fetch(GAS_URL).then(r => r.json());
    allGuestData = Array.isArray(res) ? res : (res.data || res.guests || []);
    defaultCard  = allGuestData.find(g => g.id === 'default') || null;

    allGuestData.forEach(g => {
      if (g.phone) {
        validNumbers.add(String(g.phone).replace(/\D/g, ''));
      }
    });
  } catch (_) {}
}

/* ══════════════════════════════════════
   LOCK SCREEN
══════════════════════════════════════ */
async function initLockScreen() {
  const screen = document.getElementById('lockScreen');
  const input  = document.getElementById('phoneInput');
  const btn    = document.getElementById('lockBtn');
  const errEl  = document.getElementById('lockError');
  const loader = document.getElementById('loginLoader');

  async function attempt() {
    const val = input.value.replace(/\D/g, '');
    if (!validNumbers.has(val)) {
      errEl.textContent = '僅限婚禮賓客，謝謝';
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      input.addEventListener('animationend', () => input.classList.remove('shake'), { once: true });
      setTimeout(() => { errEl.textContent = ''; }, 2200);
      return;
    }

    if (val !== MASTER_PHONE) {
      const found = allGuestData.find(g => String(g.phone).replace(/\D/g, '') === val);
      currentUserId = found?.id ?? null;
    }
    await handleLogin({ loader, screen });
  }
  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') attempt();
  });
}

async function handleLogin({ loader, screen }) {
  try {
    loader.classList.remove('hidden');
    screen.classList.add('unlocking');
    const animationPromise = new Promise(resolve => {
      screen.addEventListener('animationend', resolve, { once: true });
    });

    const dataPromise = (async () => {
      if (currentUserId) {
        try {
          const res = await fetch(`${GAS_URL}?uid=${currentUserId}`).then(r => r.json());
          if (Array.isArray(res.myLikes)) {
            res.myLikes.forEach(id => myLikes.add(id));
          }
        } catch (_) {}
      }
      patchLikeButtons();
    })();
    await Promise.all([animationPromise, dataPromise, guestDataReady]);
    document.getElementById('loginLoader')?.classList.add('hidden');
    screen.remove();
  } catch (err) {
    loader.classList.add('hidden');
    alert('登入失敗，請稍後再試');
  }
}

function patchLikeButtons() {
  likesReady = true;
  document.querySelectorAll('.like-btn').forEach(btn => {
    const id = btn.dataset.guestId;
    if (id) btn.classList.toggle('liked', myLikes.has(id));
  });
  const activeTab = document.querySelector('.nav-tab.active');
  if (activeTab?.dataset.filter === 'likes') activeTab.dispatchEvent(new Event('click'));
}

/* ══════════════════════════════════════
   MAIN APP
══════════════════════════════════════ */
async function initMainApp() {
  myLikes.add(defaultCard.id);

  const STACK = 3;
  const ANIM_MS = 500;
  const area  = document.getElementById('stackArea');
  let allGuests = allGuestData;
  let guests    = [];
  let current   = 0;
  let busy      = false;
  let sx = 0, sy = 0;
  const pIdx    = {};

  /* ── Preload images ── */
  const imgCache = {};
  await Promise.all(allGuests.map(g => {
    pIdx[g.id] = 0;
    if (!g.photos?.length) return Promise.resolve();
    imgCache[g.id] = [];
    return Promise.all(g.photos.map((src, i) => {
      const img = new Image();
      img.fetchPriority = i === 0 ? 'high' : 'low';
      img.src = src;
      imgCache[g.id][i] = img;
      return img.decode().catch(() => {});
    }));
  }));

  /* ── Helpers ── */
  function wrap(i, len) { return ((i % len) + len) % len; }

  function prefetchGuest(idx) {
    const g = guests[wrap(idx, guests.length)];
    if (!g || !g.photos?.length || imgCache[g.id]) return;
    imgCache[g.id] = g.photos.map((src, i) => {
      const img = new Image();
      img.fetchPriority = i === 0 ? 'high' : 'low';
      img.src = src;
      img.decode().catch(() => {});
      return img;
    });
  }

  function sortedLikes() {
    const liked = allGuests.filter(g => myLikes.has(g.id) && g.id !== defaultCard?.id);
    if (defaultCard && myLikes.has(defaultCard.id)) liked.push(defaultCard);
    return liked;
  }

  function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ── Nav tabs ── */
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      busy = false;
      sx = 0; sy = 0;
      const f = tab.dataset.filter;

      if (f === 'likes') {
        area.innerHTML = '';
        if (!likesReady) return;
        const likedGuests = sortedLikes();
        if (!likedGuests.length) {
          const empty = document.createElement('div');
          empty.className = 'likes-empty';
          empty.innerHTML = `
            <div class="likes-empty-box">
              <div class="likes-empty-title">
                沒有收藏的卡片
                <div class="en">No saved cards yet</div>
              </div>
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21C12 21 3 14.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.91 3.81 13 5.08C14.09 3.81 15.76 3 17.5 3C20.58 3 23 5.42 23 8.5C23 14.5 12 21 12 21Z"
                  fill="none" stroke="var(--bark)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="likes-empty-sub">
                滑動卡片，點擊愛心<br>把感興趣的人加入這裡
                <div class="en">Swipe and tap to save cards you like</div>
              </div>
            </div>`;
          area.appendChild(empty);
        } else {
          guests = likedGuests;
          current = 0;
          likedGuests.forEach(g => { pIdx[g.id] = 0; });
          render();
        }
        return;
      }

      let filtered = allGuests.filter(g => g.gender === f);
      if (f === 'male' || f === 'female') filtered = shuffleArray(filtered);
      guests = filtered;
      current = 0;
      allGuests.forEach(g => { pIdx[g.id] = 0; });
      render();
    });
  });

  /* ── Card builders ── */
  function mkIgSlide(g) {
    const handle = g.instagram || '';
    const el = document.createElement('div');
    el.className = 'ig-slide';
    if (pIdx[g.id] === (g.photos?.length ?? 0)) el.classList.add('visible');
    el.innerHTML = `
      <div class="ig-deco-ring">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="5" stroke="#ffffff" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4.5" stroke="#ffffff" stroke-width="1.5"/>
          <circle cx="17.5" cy="6.5" r="1.1" fill="#ffffff"/>
        </svg>
      </div>
      <div class="ig-name">${g.name}</div>
      <div class="ig-handle-lbl">${handle ? '@' + handle : 'Instagram'}</div>
      ${handle ? `<a class="ig-btn" href="https://www.instagram.com/${handle}" target="_blank" rel="noopener">前往 Instagram</a>` : ''}
      <div class="ig-foot">— follow to connect —</div>`;
    return el;
  }

  function mkCard(g) {
    if (!g) return document.createElement('div');
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.guestId = g.id;

    const photos = g.photos || [];
    const total  = photos.length + 1;
    const cur    = pIdx[g.id];
    const isIg   = cur === photos.length;

    const photosWrap = document.createElement('div');
    photosWrap.className = 'card-photos';
    photos.forEach((src, i) => {
      const div = document.createElement('div');
      div.className = 'card-photo' + (i === cur || (isIg && i === photos.length - 1) ? ' active' : '');
      const img = imgCache[g.id]?.[i] ?? (() => { const el = new Image(); el.src = src; return el; })();
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;';
      div.appendChild(img);
      photosWrap.appendChild(div);
    });
    card.appendChild(photosWrap);
    card.appendChild(mkIgSlide(g));

    if (total > 1) {
      const dotsEl = document.createElement('div');
      dotsEl.className = 'photo-dots';
      for (let i = 0; i < total; i++) {
        const d = document.createElement('div');
        d.className = 'photo-dot' + (i === cur ? ' active' : '');
        dotsEl.appendChild(d);
      }
      card.appendChild(dotsEl);
      ['prev', 'next'].forEach(dir => {
        const hz = document.createElement('div');
        hz.className = `hit-${dir}`;
        hz.addEventListener('click', e => { e.stopPropagation(); slidePhoto(card, g, dir === 'next' ? 1 : -1); });
        card.appendChild(hz);
      });
    }

    const info = document.createElement('div');
    info.className = 'card-info';
    if (isIg) info.style.opacity = '0';
    info.innerHTML = `
      <div class="card-name">${g.name}</div>
      <div class="card-meta">
        <span class="card-age">${g.age} yrs old</span>
        <span class="meta-dot"></span>
        <span class="card-zodiac">${g.zodiac}</span>
      </div>`;
    card.appendChild(info);

    const likeBtn = document.createElement('button');
    likeBtn.className = 'like-btn' + (myLikes.has(g.id) ? ' liked' : '');
    likeBtn.dataset.guestId = g.id;
    likeBtn.setAttribute('aria-label', 'Like');
    likeBtn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path class="heart-outline" d="M12 21C12 21 3 14.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.91 3.81 13 5.08C14.09 3.81 15.76 3 17.5 3C20.58 3 23 5.42 23 8.5C23 14.5 12 21 12 21Z" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    likeBtn.addEventListener('click', e => {
      e.stopPropagation();
      const wasLiked = likeBtn.classList.contains('liked');
      if (g.id === 'default' && !wasLiked) return;
      likeBtn.classList.toggle('liked', !wasLiked);
      wasLiked ? myLikes.delete(g.id) : myLikes.add(g.id);
      likeBtn.classList.remove('pop');
      void likeBtn.offsetWidth;
      likeBtn.classList.add('pop');
      likeBtn.addEventListener('animationend', () => likeBtn.classList.remove('pop'), { once: true });
      syncLikesTab();
      if (currentUserId) {
        fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: wasLiked ? 'removeLike' : 'addLike', userId: currentUserId, targetId: g.id })
        }).catch(() => {});
      }
    });

    card.appendChild(likeBtn);
    return card;
  }

  function syncLikesTab() {
    const activeTab = document.querySelector('.nav-tab.active');
    if (activeTab?.dataset.filter === 'likes') activeTab.dispatchEvent(new Event('click'));
  }

  /* ── Photo slide ── */
  function slidePhoto(card, g, dir) {
    const photos = g.photos || [];
    pIdx[g.id]   = wrap(pIdx[g.id] + dir, photos.length + 1);
    const newIdx = pIdx[g.id];
    const isIg   = newIdx === photos.length;

    card.querySelectorAll('.card-photo').forEach(p => p.classList.remove('active'));
    card.querySelectorAll('.card-photo')[isIg ? photos.length - 1 : newIdx]?.classList.add('active');
    card.querySelectorAll('.photo-dot').forEach((d, i) => d.classList.toggle('active', i === newIdx));
    card.querySelector('.ig-slide')?.classList.toggle('visible', isIg);
    const info = card.querySelector('.card-info');
    if (info) info.style.opacity = isIg ? '0' : '1';
    const btn = card.querySelector('.like-btn');
    if (btn) { btn.style.display = 'none'; btn.offsetHeight; btn.style.display = 'flex'; }
  }

  /* ── Render ── */
  function render() {
    area.innerHTML = '';
    if (!guests.length) return;
    const frag  = document.createDocumentFragment();
    const count = Math.min(STACK, guests.length);
    for (let i = count - 1; i >= 0; i--) {
      const c = mkCard(guests[wrap(current + i, guests.length)]);
      c.setAttribute('data-depth', i);
      frag.appendChild(c);
    }
    area.appendChild(frag);
    prefetchGuest(current + STACK);
  }

  /* ── Navigation ── */
  function next() {
    if (busy || guests.length <= 1) return;
    busy = true;
    const front = area.querySelector('.card[data-depth="0"]');
    if (front) {
      front.classList.add('exit-left');
      let done = false;
      const finish = () => {
        if (done) return; done = true;
        current = wrap(current + 1, guests.length);
        busy = false; render();
      };
      front.addEventListener('animationend', finish, { once: true });
      setTimeout(finish, ANIM_MS);
    } else {
      busy = false;
    }
    area.querySelectorAll('.card[data-depth]').forEach(c => {
      const d = +c.dataset.depth;
      if (d > 0) c.setAttribute('data-depth', d - 1);
    });
  }

  function prev() {
    if (busy || guests.length <= 1) return;
    busy = true;
    current = wrap(current - 1, guests.length);
    const nc = mkCard(guests[current]);
    nc.setAttribute('data-depth', '0');
    nc.classList.add('enter-left');
    area.insertBefore(nc, area.firstChild);
    area.querySelectorAll('.card:not(.enter-left)').forEach(c => {
      c.setAttribute('data-depth', +(c.dataset.depth || 0) + 1);
    });
    let done = false;
    const finish = () => {
      if (done) return; done = true;
      busy = false; render();
    };
    nc.addEventListener('animationend', finish, { once: true });
    setTimeout(finish, ANIM_MS);
  }

  /* ── Touch swipe ── */
  area.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  area.addEventListener('touchend', e => {
    if (sx === 0 && sy === 0) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    sx = 0; sy = 0;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.2) dx < 0 ? next() : prev();
  }, { passive: true });

  render();
}
</script>
</body>
</html>
